<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Songs</title>
</head>
<body>
    <header>
        <h1>Best Songs</h1>
    </header>

    <main>
        <ul>
            <li th:each="song : ${songs}" th:text="${song.title}"/>
        </ul>
    </main>
</body>
</html>
