<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Movies</title>
</head>
<body>
    <header>
        <h1>Best Movies</h1>
    </header>

    <main>
        <ul>
            <li th:each="movie : ${movies}" th:text="${movie.title}" />
        </ul>
    </main>
</body>
</html>
